<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J's App Menu</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .menu-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .btn {
            display: block;
            padding: 20px;
            text-align: center;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active {
            transform: scale(0.98);
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <a href="{{ links.rag }}" class="btn">Multi-agent RAG: Data Sharing, Responsible AI, Model AI Governance</a>
        <a href="{{ links.chatbot }}" class="btn">Unfriendly, Unhelpful but Entertaining Chabot</a>
        <a href="{{ links.vit }}" class="btn">ViT for SEM Defect Detection for Metal Interconnects</a>
    </div>
</body>
</html>
