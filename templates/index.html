<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J's App Menu</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Aligns content to the top instead of the middle */
            justify-content: flex-start; 
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            /* Adds space so the title isn't touching the very top of the screen */
            padding-top: 40px; 
        }

        .menu-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .btn {
            display: block;
            padding: 20px;
            text-align: center;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>J's Menu of the Day</h1>
        <a href="{{ links.rag }}" class="btn" target="_blank" rel="noopener noreferrer">Multi-agent RAG: Data Sharing, Responsible AI, Model AI Governance</a>
        <a href="{{ links.chatbot }}" class="btn" target="_blank" rel="noopener noreferrer">Unfriendly, Unhelpful but Entertaining Chabot</a>
        <a href="{{ links.vit }}" class="btn" target="_blank" rel="noopener noreferrer">ViT for SEM Defect Detection for Metal Interconnects</a>
    </div>
</body>
</html>
